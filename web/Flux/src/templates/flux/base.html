{% load static %}
<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Flux{% endblock %}</title>
  <link rel="icon" href="{% static 'flux/favicon.svg' %}" type="image/svg+xml">
  <script>
    try {
      document.documentElement.dataset.theme = localStorage.getItem("flux-theme") || "green";
    } catch {
      document.documentElement.dataset.theme = "green";
    }
  </script>
  <link rel="stylesheet" href="{% static 'flux/site.css' %}">
  <script src="{% static 'flux/vendor/htmx/htmx.min.js' %}?v=2.0.4" defer></script>
  <script src="{% static 'flux/site.js' %}" defer></script>
</head>
<body{% if embed_mode %} class="embed-mode"{% endif %}>
  {% if not embed_mode %}<header class="site-header">
    <a class="brand" href="{% url 'dashboard:home' %}">
      <span>Flux</span>
      <small>Control Workbench</small>
    </a>
    <nav>
      <a href="{% url 'dashboard:home' %}">Dashboard</a>
      <a href="{% url 'mine:index' %}">Mine</a>
      <a href="{% url 'build:index' %}">Build</a>
      <a href="{% url 'spot:index' %}">Spot</a>
      <a href="{% url 'chart:index' %}">Chart</a>
      <a href="{% url 'sim:index' %}">Sim</a>
      <a href="{% url 'serve:index' %}">Serve</a>
    </nav>
    <div class="theme-picker" aria-label="Primary color theme" data-theme-picker>
      <button type="button" class="theme-swatch theme-current" data-theme-toggle aria-label="Choose color theme" aria-expanded="false">█</button>
      <div class="theme-options" data-theme-options hidden>
        <button type="button" class="theme-swatch theme-swatch-green" data-theme-choice="green" aria-label="Use green theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-blue" data-theme-choice="blue" aria-label="Use blue theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-coral" data-theme-choice="coral" aria-label="Use coral theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-purple" data-theme-choice="purple" aria-label="Use purple theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-orange" data-theme-choice="orange" aria-label="Use orange theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-black" data-theme-choice="black" aria-label="Use black theme">█</button>
        <button type="button" class="theme-swatch theme-swatch-white" data-theme-choice="white" aria-label="Use white theme">█</button>
      </div>
    </div>
  </header>{% endif %}
  <main class="page">
    <section
      id="flux-page-content"
      {% if flux_web_pulse.enabled and not embed_mode %}
        data-flux-web-pulse
        data-flux-web-pulse-seconds="{{ flux_web_pulse.refresh_seconds }}"
        hx-get="{{ request.get_full_path }}"
        hx-trigger="every {{ flux_web_pulse.refresh_seconds }}s [fluxDisplayPulseCanRun()]"
        hx-target="this"
        hx-select="#flux-page-content"
        hx-swap="outerHTML show:none"
        hx-push-url="false"
      {% endif %}
    >
      {% if messages %}
        <section class="messages">
          {% for message in messages %}<p>{{ message }}</p>{% endfor %}
        </section>
      {% endif %}
      {% block content %}{% endblock %}
    </section>
  </main>
</body>
</html>
